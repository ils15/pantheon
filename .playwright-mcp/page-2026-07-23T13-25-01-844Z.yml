      - main [ref=e170]:
        - generic [ref=e172]:
          - heading "Plugins" [level=1] [ref=e173]
          - paragraph [ref=e174]: Escreva seus próprios plugins para estender o opencode.
        - generic [ref=e176]:
          - generic [ref=e177]:
            - paragraph [ref=e178]: Plugins permitem que você estenda o opencode conectando-se a vários eventos e personalizando o comportamento. Você pode criar plugins para adicionar novos recursos, integrar-se a serviços externos ou modificar o comportamento padrão do opencode.
            - paragraph [ref=e179]:
              - text: Para exemplos, confira os
              - link "plugins" [ref=e180] [cursor=pointer]:
                - /url: /docs/ecosystem#plugins
              - text: criados pela comunidade.
            - separator [ref=e181]
            - heading [level=2] [ref=e182]:
              - link "Usando um plugin" [ref=e183]:
                - /url: "#usando-um-plugin"
            - paragraph [ref=e184]: Existem duas maneiras de carregar plugins.
            - separator [ref=e185]
            - heading [level=3] [ref=e186]:
              - link "De arquivos locais" [ref=e187]:
                - /url: "#de-arquivos-locais"
            - paragraph [ref=e188]: Coloque arquivos JavaScript ou TypeScript no diretório de plugins.
            - list [ref=e189]:
              - listitem [ref=e190]:
                - code [ref=e191]: "`.opencode/plugins/`"
                - text: "- Plugins em nível de projeto"
              - listitem [ref=e192]:
                - code [ref=e193]: "`~/.config/opencode/plugins/`"
                - text: "- Plugins globais"
            - paragraph [ref=e194]: Os arquivos nesses diretórios são carregados automaticamente na inicialização.
            - separator [ref=e195]
            - heading [level=3] [ref=e196]:
              - link "Do npm" [ref=e197]:
                - /url: "#do-npm"
            - paragraph [ref=e198]: Especifique pacotes npm no seu arquivo de configuração.
            - figure "opencode.json" [ref=e200]:
              - code [ref=e204]:
                - generic [ref=e205]: "{"
                - generic [ref=e207]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e209]: "\"plugin\": [\"opencode-helicone-session\", \"opencode-wakatime\", \"@my-org/custom-plugin\"]"
                - generic [ref=e211]: "}"
              - button "Copy to clipboard" [ref=e214] [cursor=pointer]
            - paragraph [ref=e216]: Pacotes npm regulares e escopados são suportados.
            - paragraph [ref=e217]:
              - text: Navegue pelos plugins disponíveis no
              - link "ecossistema" [ref=e218] [cursor=pointer]:
                - /url: /docs/ecosystem#plugins
              - text: .
            - separator [ref=e219]
            - heading [level=3] [ref=e220]:
              - link "Como os plugins são instalados" [ref=e221]:
                - /url: "#como-os-plugins-são-instalados"
            - paragraph [ref=e222]:
              - strong [ref=e223]: Plugins npm
              - text: são instalados automaticamente usando Bun na inicialização. Pacotes e suas dependências são armazenados em cache em
              - code [ref=e224]: "`~/.cache/opencode/node_modules/`"
              - text: .
            - paragraph [ref=e225]:
              - strong [ref=e226]: Plugins locais
              - text: são carregados diretamente do diretório de plugins. Para usar pacotes externos, você deve criar um
              - code [ref=e227]: "`package.json`"
              - text: dentro do seu diretório de configuração (veja
              - link "Dependências" [ref=e228] [cursor=pointer]:
                - /url: "#dependencies"
              - text: ), ou publicar o plugin no npm e
              - link "adicioná-lo à sua configuração" [ref=e229] [cursor=pointer]:
                - /url: /docs/config#plugins
              - text: .
            - separator [ref=e230]
            - heading [level=3] [ref=e231]:
              - link "Ordem de carregamento" [ref=e232]:
                - /url: "#ordem-de-carregamento"
            - paragraph [ref=e233]: "Os plugins são carregados de todas as fontes e todos os hooks são executados em sequência. A ordem de carregamento é:"
            - list [ref=e234]:
              - listitem [ref=e235]:
                - text: Configuração global (
                - code [ref=e236]: "`~/.config/opencode/opencode.json`"
                - text: )
              - listitem [ref=e237]:
                - text: Configuração do projeto (
                - code [ref=e238]: "`opencode.json`"
                - text: )
              - listitem [ref=e239]:
                - text: Diretório de plugins global (
                - code [ref=e240]: "`~/.config/opencode/plugins/`"
                - text: )
              - listitem [ref=e241]:
                - text: Diretório de plugins do projeto (
                - code [ref=e242]: "`.opencode/plugins/`"
                - text: )
            - paragraph [ref=e243]: Pacotes npm duplicados com o mesmo nome e versão são carregados uma vez. No entanto, um plugin local e um plugin npm com nomes semelhantes são carregados separadamente.
            - separator [ref=e244]
            - heading [level=2] [ref=e245]:
              - link "Criando um plugin" [ref=e246]:
                - /url: "#criando-um-plugin"
            - paragraph [ref=e247]:
              - text: Um plugin é um
              - strong [ref=e248]: módulo JavaScript/TypeScript
              - text: que exporta uma ou mais funções de plugin. Cada função recebe um objeto de contexto e retorna um objeto de hooks.
            - separator [ref=e249]
            - heading [level=3] [ref=e250]:
              - link "Dependências" [ref=e251]:
                - /url: "#dependências"
            - paragraph [ref=e252]:
              - text: Plugins locais e ferramentas personalizadas podem usar pacotes npm externos. Adicione um
              - code [ref=e253]: "`package.json`"
              - text: ao seu diretório de configuração com as dependências necessárias.
            - figure ".opencode/package.json" [ref=e255]:
              - code [ref=e259]:
                - generic [ref=e260]: "{"
                - generic [ref=e262]: "\"dependencies\": {"
                - generic [ref=e264]: "\"shescape\": \"^2.1.0\""
                - generic [ref=e266]: "}"
                - generic [ref=e269]: "}"
              - button "Copy to clipboard" [ref=e272] [cursor=pointer]
            - paragraph [ref=e274]:
              - text: O opencode executa
              - code [ref=e275]: "`bun install`"
              - text: na inicialização para instalar esses pacotes. Seus plugins e ferramentas podem então importá-los.
            - figure ".opencode/plugins/my-plugin.ts" [ref=e277]:
              - code [ref=e281]:
                - generic [ref=e282]: "import { escape } from \"shescape\""
                - generic [ref=e286]: "export const MyPlugin = async (ctx) => {"
                - generic [ref=e288]: "return {"
                - generic [ref=e290]: "\"tool.execute.before\": async (input, output) => {"
                - generic [ref=e292]: "if (input.tool === \"bash\") {"
                - generic [ref=e294]: output.args.command = escape(output.args.command)
                - generic [ref=e297]: "}"
                - generic [ref=e300]: "},"
                - generic [ref=e303]: "}"
                - generic [ref=e306]: "}"
              - button "Copy to clipboard" [ref=e309] [cursor=pointer]
            - separator [ref=e311]
            - heading [level=3] [ref=e312]:
              - link "Estrutura básica" [ref=e313]:
                - /url: "#estrutura-básica"
            - figure ".opencode/plugins/example.js" [ref=e315]:
              - code [ref=e319]:
                - generic [ref=e320]: "export const MyPlugin = async ({ project, client, $, directory, worktree }) => {"
                - generic [ref=e322]: console.log("Plugin initialized!")
                - generic [ref=e327]: "return {"
                - generic [ref=e329]: // Hook implementations go here
                - generic [ref=e331]: "}"
                - generic [ref=e334]: "}"
              - button "Copy to clipboard" [ref=e337] [cursor=pointer]
            - paragraph [ref=e339]: "A função do plugin recebe:"
            - list [ref=e340]:
              - listitem [ref=e341]:
                - code [ref=e342]: "`project`"
                - text: ": As informações do projeto atual."
              - listitem [ref=e343]:
                - code [ref=e344]: "`directory`"
                - text: ": O diretório de trabalho atual."
              - listitem [ref=e345]:
                - code [ref=e346]: "`worktree`"
                - text: ": O caminho do worktree do git."
              - listitem [ref=e347]:
                - code [ref=e348]: "`client`"
                - text: ": Um cliente SDK do opencode para interagir com a AI."
              - listitem [ref=e349]:
                - code [ref=e350]: "`$`"
                - text: ": A"
                - link "API shell" [ref=e351] [cursor=pointer]:
                  - /url: https://bun.com/docs/runtime/shell
                - text: do Bun para executar comandos.
            - separator [ref=e352]
            - heading [level=3] [ref=e353]:
              - link "Suporte a TypeScript" [ref=e354]:
                - /url: "#suporte-a-typescript"
            - paragraph [ref=e355]: "Para plugins TypeScript, você pode importar tipos do pacote de plugin:"
            - figure "my-plugin.ts" [ref=e357]:
              - code [ref=e361]:
                - generic [ref=e362]: "import type { Plugin } from \"@opencode-ai/plugin\""
                - generic [ref=e366]: "export const MyPlugin: Plugin = async ({ project, client, $, directory, worktree }) => {"
                - generic [ref=e368]: "return {"
                - generic [ref=e370]: // Type-safe hook implementations
                - generic [ref=e372]: "}"
                - generic [ref=e375]: "}"
              - button "Copy to clipboard" [ref=e378] [cursor=pointer]
            - separator [ref=e380]
            - heading [level=3] [ref=e381]:
              - link "Eventos" [ref=e382]:
                - /url: "#eventos"
            - paragraph [ref=e383]: Plugins podem se inscrever em eventos como visto abaixo na seção Exemplos. Aqui está uma lista dos diferentes eventos disponíveis.
