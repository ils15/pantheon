                - blockquote [ref=f2e1024]:
                  - paragraph [ref=f2e1025]:
                    - text: "\"I converted a 45k line tauri app into a SaaS web app overnight using Ohmyopencode and ralph loop. Started with interview me prompt, asked it for ratings and recommendations on the questions. It was amazing to watch it work and to wake up this morning to a mostly working website!\" -"
