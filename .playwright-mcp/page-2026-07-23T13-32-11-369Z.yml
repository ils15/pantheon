                - separator [ref=f2e1812]
                - paragraph [ref=f2e1813]: I burned through $24K in LLM tokens on personal projects. Tried every tool. Configured everything to death. OpenCode won.
                - paragraph [ref=f2e1814]: Every problem I hit, the fix is baked into this plugin. Install and go.
                - paragraph [ref=f2e1815]:
                  - text: If OpenCode is Debian/Arch, oh-my-openagent is Ubuntu/
                  - link "Omarchy" [ref=f2e1816] [cursor=pointer]:
                    - /url: https://omarchy.org/
                  - text: .
                - paragraph [ref=f2e1817]:
                  - text: Heavily influenced by
                  - link "AmpCode" [ref=f2e1818] [cursor=pointer]:
                    - /url: https://ampcode.com
                  - text: and
                  - link "Claude Code" [ref=f2e1819] [cursor=pointer]:
                    - /url: https://code.claude.com/docs/overview
                  - text: . Features ported, often improved. Still building. It's
                  - strong [ref=f2e1820]: Open
                  - text: Code.
                - paragraph [ref=f2e1821]: Other harnesses promise multi-model orchestration. We ship it. Stability too. And features that actually work.
                - paragraph [ref=f2e1822]: "I'm this project's most obsessive user:"
                - list [ref=f2e1823]:
                  - listitem [ref=f2e1824]: Which model has the sharpest logic?
                  - listitem [ref=f2e1825]: Who's the debugging god?
                  - listitem [ref=f2e1826]: Who writes the best prose?
                  - listitem [ref=f2e1827]: Who dominates frontend?
                  - listitem [ref=f2e1828]: Who owns backend?
                  - listitem [ref=f2e1829]: What's fastest for daily driving?
                  - listitem [ref=f2e1830]: What are competitors shipping?
                - paragraph [ref=f2e1831]: This plugin is the distillation. Take the best. Got improvements? PRs welcome.
                - paragraph [ref=f2e1832]:
                  - strong [ref=f2e1833]: Stop agonizing over harness choices.
                  - strong [ref=f2e1834]: I'll research, steal the best, and ship it here.
                - paragraph [ref=f2e1835]: Sounds arrogant? Have a better way? Contribute. You're welcome.
                - paragraph [ref=f2e1836]: No affiliation with any project or model mentioned. Just personal experimentation.
                - paragraph [ref=f2e1837]:
                  - text: "Credit: The LazyCodex name idea is inspired by"
                  - link "LazyVim" [ref=f2e1838] [cursor=pointer]:
                    - /url: https://github.com/LazyVim/LazyVim
                  - text: . The Ultragoal and UltraQA ideas are inspired by
                  - link "oh-my-codex" [ref=f2e1839] [cursor=pointer]:
                    - /url: https://github.com/Yeachan-Heo/oh-my-codex
                  - text: ", reimplemented from concept for OmO."
                - paragraph [ref=f2e1840]:
                  - text: 99% of this project was built with OpenCode. I don't really know TypeScript,
                  - strong [ref=f2e1841]: but I personally reviewed and largely rewrote this doc.
