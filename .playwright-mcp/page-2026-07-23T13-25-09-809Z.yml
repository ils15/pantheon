            - paragraph [ref=f1e743]: Este caminho é relativo ao local onde o arquivo de configuração está localizado. Portanto, isso funciona tanto para a configuração global do opencode quanto para a configuração específica do projeto.
            - separator [ref=f1e744]
            - heading [level=3] [ref=f1e745]:
              - link "Modelo" [ref=f1e746]:
                - /url: "#modelo"
            - paragraph [ref=f1e747]:
              - text: Use a configuração
              - code [ref=f1e748]: "`model`"
              - text: para substituir o modelo para este agente. Útil para usar diferentes modelos otimizados para diferentes tarefas. Por exemplo, um modelo mais rápido para planejamento, um modelo mais capaz para implementação.
            - complementary "Dica" [ref=f1e749]:
              - paragraph [ref=f1e750]: Dica
              - paragraph [ref=f1e755]:
                - text: Se você não especificar um modelo, os agentes primários usam o
                - link "modelo configurado globalmente" [ref=f1e756] [cursor=pointer]:
                  - /url: /docs/config#models
                - text: enquanto subagentes usarão o modelo do agente primário que invocou o subagente.
            - figure "opencode.json" [ref=f1e758]:
