              - button "Copy to clipboard" [ref=f1e955] [cursor=pointer]
            - paragraph [ref=f1e957]: Você também pode definir permissões em agentes Markdown.
            - figure "~/.config/opencode/agents/review.md" [ref=f1e959]:
              - code [ref=f1e963]:
