                - /url: /docs/tools
              - text: .
            - separator [ref=f1e881]
            - heading [level=3] [ref=f1e882]:
              - link "Permissões" [ref=f1e883]:
                - /url: "#permissões"
            - paragraph [ref=f1e884]:
              - text: Você pode configurar permissões para gerenciar quais ações um agente pode realizar. Atualmente, as permissões para as ferramentas
              - code [ref=f1e885]: "`edit`"
              - text: ","
              - code [ref=f1e886]: "`bash`"
              - text: e
              - code [ref=f1e887]: "`webfetch`"
              - text: "podem ser configuradas para:"
            - list [ref=f1e888]:
              - listitem [ref=f1e889]:
                - code [ref=f1e890]: "`\"ask\"`"
                - text: — Solicitar aprovação antes de executar a ferramenta
              - listitem [ref=f1e891]:
                - code [ref=f1e892]: "`\"allow\"`"
                - text: — Permitir todas as operações sem aprovação
              - listitem [ref=f1e893]:
                - code [ref=f1e894]: "`\"deny\"`"
                - text: — Desativar a ferramenta
            - figure "opencode.json" [ref=f1e896]:
