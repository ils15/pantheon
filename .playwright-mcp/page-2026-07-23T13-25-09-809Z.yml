            - heading [level=3] [ref=f1e787]:
              - link "Ferramentas" [ref=f1e788]:
                - /url: "#ferramentas"
            - paragraph [ref=f1e789]:
              - text: Controle quais ferramentas estão disponíveis neste agente com a configuração
              - code [ref=f1e790]: "`tools`"
              - text: . Você pode habilitar ou desabilitar ferramentas específicas definindo-as como
