                - generic [ref=f1e580]: "}"
                - generic [ref=f1e583]: "}"
              - button "Copy to clipboard" [ref=f1e586] [cursor=pointer]
            - paragraph [ref=f1e588]: "Os valores de temperatura geralmente variam de 0.0 a 1.0:"
            - list [ref=f1e589]:
              - listitem [ref=f1e590]:
                - strong [ref=f1e591]: 0.0-0.2
                - text: ": Respostas muito focadas e determinísticas, ideais para análise de código e planejamento"
              - listitem [ref=f1e592]:
                - strong [ref=f1e593]: 0.3-0.5
                - text: ": Respostas equilibradas com alguma criatividade, boas para tarefas de desenvolvimento gerais"
              - listitem [ref=f1e594]:
                - strong [ref=f1e595]: 0.6-1.0
                - text: ": Respostas mais criativas e variadas, úteis para brainstorming e exploração"
            - figure "opencode.json" [ref=f1e597]:
              - code [ref=f1e601]:
                - generic [ref=f1e602]: "{"
                - generic [ref=f1e604]: "\"agent\": {"
                - generic [ref=f1e606]: "\"analyze\": {"
