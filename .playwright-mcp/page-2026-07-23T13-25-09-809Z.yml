                - generic [ref=f1e669]: "}"
              - button "Copy to clipboard" [ref=f1e672] [cursor=pointer]
            - paragraph [ref=f1e674]: Quando o limite é alcançado, o agente recebe um prompt especial do sistema instruindo-o a responder com um resumo de seu trabalho e tarefas recomendadas restantes.
            - complementary "Cuidado" [ref=f1e675]:
              - paragraph [ref=f1e676]: Cuidado
              - paragraph [ref=f1e680]:
                - text: O campo legado
                - code [ref=f1e681]: "`maxSteps`"
                - text: está obsoleto. Use
                - code [ref=f1e682]: "`steps`"
                - text: em vez disso.
            - separator [ref=f1e683]
