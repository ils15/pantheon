                - generic [ref=f1e990]: Apenas analise o código e sugira alterações.
              - button "Copy to clipboard" [ref=f1e993] [cursor=pointer]
            - paragraph [ref=f1e995]: Você pode definir permissões para comandos bash específicos.
            - figure "opencode.json" [ref=f1e997]:
