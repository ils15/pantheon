            - paragraph [ref=f1e842]: "Você também pode usar curingas para controlar várias ferramentas ao mesmo tempo. Por exemplo, para desativar todas as ferramentas de um servidor MCP:"
            - figure "opencode.json" [ref=f1e844]:
