            - paragraph [ref=f1e716]:
              - text: Especifique um arquivo de prompt do sistema personalizado para este agente com a configuração
              - code [ref=f1e717]: "`prompt`"
              - text: . O arquivo de prompt deve conter instruções específicas para o propósito do agente.
            - figure "opencode.json" [ref=f1e719]:
              - code [ref=f1e723]:
