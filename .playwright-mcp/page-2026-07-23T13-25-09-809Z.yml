      - main [ref=f1e210]:
        - generic [ref=f1e212]:
          - heading "Agentes" [level=1] [ref=f1e213]
          - paragraph [ref=f1e214]: Configure e use agentes especializados.
        - generic [ref=f1e216]:
          - generic [ref=f1e217]:
            - paragraph [ref=f1e218]: Agentes são assistentes de IA especializados que podem ser configurados para tarefas e fluxos de trabalho específicos. Eles permitem que você crie ferramentas focadas com prompts, modelos e acesso a ferramentas personalizados.
            - complementary "Dica" [ref=f1e219]:
              - paragraph [ref=f1e220]: Dica
              - paragraph [ref=f1e225]: Use o agente de planejamento (plan) para analisar código e revisar sugestões sem fazer alterações no código.
            - paragraph [ref=f1e226]:
              - text: Você pode alternar entre agentes durante uma sessão ou invocá-los com a menção
              - code [ref=f1e227]: "`@`"
              - text: .
            - separator [ref=f1e228]
            - heading [level=2] [ref=f1e229]:
              - link "Tipos" [ref=f1e230]:
                - /url: "#tipos"
            - paragraph [ref=f1e231]: Existem dois tipos de agentes no opencode; agentes primários e subagentes.
            - separator [ref=f1e232]
            - heading [level=3] [ref=f1e233]:
              - link "Agentes primários" [ref=f1e234]:
                - /url: "#agentes-primários"
            - paragraph [ref=f1e235]:
              - text: Agentes primários são os principais assistentes com os quais você interage diretamente. Você pode alternar entre eles usando a tecla
              - strong [ref=f1e236]: Tab
              - text: ou sua tecla de atalho configurada
              - code [ref=f1e237]: "`switch_agent`"
              - text: . Esses agentes lidam com sua conversa principal. O acesso às ferramentas é configurado por meio de permissões — por exemplo, Build tem todas as ferramentas habilitadas, enquanto Plan é restrito.
            - complementary "Dica" [ref=f1e238]:
              - paragraph [ref=f1e239]: Dica
              - paragraph [ref=f1e244]:
                - text: Você pode usar a tecla
                - strong [ref=f1e245]: Tab
                - text: para alternar entre agentes primários durante uma sessão.
            - paragraph [ref=f1e246]:
              - text: opencode vem com dois agentes primários integrados,
              - strong [ref=f1e247]: Build
              - text: e
              - strong [ref=f1e248]: Plan
              - text: . Vamos ver isso abaixo.
            - separator [ref=f1e249]
            - heading [level=3] [ref=f1e250]:
              - link "Subagentes" [ref=f1e251]:
                - /url: "#subagentes"
            - paragraph [ref=f1e252]:
              - text: Subagentes são assistentes especializados que agentes primários podem invocar para tarefas específicas. Você também pode invocá-los manualmente mencionando-os com
              - strong [ref=f1e253]: "@"
              - text: em suas mensagens.
            - paragraph [ref=f1e254]:
              - text: OpenCode vem com três subagentes integrados,
              - strong [ref=f1e255]: General
              - text: ","
              - strong [ref=f1e256]: Explore
              - text: e
              - strong [ref=f1e257]: Scout
              - text: . Vamos ver isso abaixo.
            - separator [ref=f1e258]
            - heading [level=2] [ref=f1e259]:
              - link "Integrados" [ref=f1e260]:
                - /url: "#integrados"
            - paragraph [ref=f1e261]: OpenCode vem com dois agentes primários integrados e três subagentes integrados.
            - separator [ref=f1e262]
            - heading [level=3] [ref=f1e263]:
              - link "build" [ref=f1e264]:
                - /url: "#build"
            - paragraph [ref=f1e265]:
              - emphasis [ref=f1e266]: Modo
              - text: ":"
              - code [ref=f1e267]: "`primary`"
            - paragraph [ref=f1e268]:
              - text: Build é o agente primário
              - strong [ref=f1e269]: padrão
              - text: com todas as ferramentas habilitadas. Este é o agente padrão para trabalho de desenvolvimento onde você precisa de acesso total a operações de arquivo e comandos do sistema.
            - separator [ref=f1e270]
            - heading [level=3] [ref=f1e271]:
              - link "plan" [ref=f1e272]:
                - /url: "#plan"
            - paragraph [ref=f1e273]:
              - emphasis [ref=f1e274]: Modo
              - text: ":"
              - code [ref=f1e275]: "`primary`"
            - paragraph [ref=f1e276]:
              - text: Um agente restrito projetado para planejamento e análise. Usamos um sistema de permissões para lhe dar mais controle e evitar alterações não intencionais. Por padrão, todos os seguintes estão configurados para
              - code [ref=f1e277]: "`ask`"
              - text: ":"
            - list [ref=f1e278]:
              - listitem [ref=f1e279]:
                - code [ref=f1e280]: "`file edits`"
                - text: ": Todas as gravações, patches e edições"
              - listitem [ref=f1e281]:
                - code [ref=f1e282]: "`bash`"
                - text: ": Todos os comandos bash"
            - paragraph [ref=f1e283]: Este agente é útil quando você deseja que o LLM analise código, sugira alterações ou crie planos sem fazer modificações reais em seu código.
            - separator [ref=f1e284]
            - heading [level=3] [ref=f1e285]:
              - link "general" [ref=f1e286]:
                - /url: "#general"
            - paragraph [ref=f1e287]:
              - emphasis [ref=f1e288]: Modo
              - text: ":"
              - code [ref=f1e289]: "`subagent`"
            - paragraph [ref=f1e290]: Um agente de propósito geral para pesquisar questões complexas e executar tarefas em múltiplas etapas. Tem acesso total às ferramentas (exceto todo), portanto, pode fazer alterações em arquivos quando necessário. Use isso para executar várias unidades de trabalho em paralelo.
            - separator [ref=f1e291]
            - heading [level=3] [ref=f1e292]:
              - link "explore" [ref=f1e293]:
                - /url: "#explore"
            - paragraph [ref=f1e294]:
              - emphasis [ref=f1e295]: Modo
              - text: ":"
              - code [ref=f1e296]: "`subagent`"
            - paragraph [ref=f1e297]: Um agente rápido e somente leitura para explorar bases de código. Não pode modificar arquivos. Use isso quando você precisar encontrar rapidamente arquivos por padrões, pesquisar código por palavras-chave ou responder perguntas sobre a base de código.
            - separator [ref=f1e298]
            - heading [level=3] [ref=f1e299]:
              - link "Scout" [ref=f1e300]:
                - /url: "#scout"
            - paragraph [ref=f1e301]:
              - emphasis [ref=f1e302]: Modo
              - text: ":"
              - code [ref=f1e303]: "`subagent`"
            - paragraph [ref=f1e304]: Um agente somente leitura para pesquisa em documentação externa e dependências. Use-o quando você precisar clonar o repositório de uma dependência para o cache gerenciado do OpenCode, inspecionar o código-fonte de uma biblioteca ou cruzar o código local com implementações upstream sem modificar seu workspace.
            - separator [ref=f1e305]
            - heading [level=3] [ref=f1e306]:
              - link "compaction" [ref=f1e307]:
                - /url: "#compaction"
            - paragraph [ref=f1e308]:
              - emphasis [ref=f1e309]: Modo
              - text: ":"
              - code [ref=f1e310]: "`primary`"
            - paragraph [ref=f1e311]: Agente de sistema oculto que compacta longos contextos em um resumo menor. Ele é executado automaticamente quando necessário e não é selecionável na interface.
            - separator [ref=f1e312]
            - heading [level=3] [ref=f1e313]:
              - link "title" [ref=f1e314]:
                - /url: "#title"
            - paragraph [ref=f1e315]:
              - emphasis [ref=f1e316]: Modo
              - text: ":"
              - code [ref=f1e317]: "`primary`"
            - paragraph [ref=f1e318]: Agente de sistema oculto que gera títulos curtos para sessões. Ele é executado automaticamente e não é selecionável na interface.
            - separator [ref=f1e319]
            - heading [level=3] [ref=f1e320]:
              - link "summary" [ref=f1e321]:
                - /url: "#summary"
            - paragraph [ref=f1e322]:
              - emphasis [ref=f1e323]: Modo
              - text: ":"
              - code [ref=f1e324]: "`primary`"
            - paragraph [ref=f1e325]: Agente de sistema oculto que cria resumos de sessões. Ele é executado automaticamente e não é selecionável na interface.
            - separator [ref=f1e326]
            - heading [level=2] [ref=f1e327]:
              - link "Uso" [ref=f1e328]:
                - /url: "#uso"
            - list [ref=f1e329]:
              - listitem [ref=f1e330]:
                - paragraph [ref=f1e331]:
                  - text: Para agentes primários, use a tecla
                  - strong [ref=f1e332]: Tab
                  - text: para alternar entre eles durante uma sessão. Você também pode usar sua tecla de atalho configurada
                  - code [ref=f1e333]: "`switch_agent`"
                  - text: .
              - listitem [ref=f1e334]:
                - paragraph [ref=f1e335]: "Subagentes podem ser invocados:"
                - list [ref=f1e336]:
                  - listitem [ref=f1e337]:
                    - paragraph [ref=f1e338]:
                      - strong [ref=f1e339]: Automaticamente
                      - text: por agentes primários para tarefas especializadas com base em suas descrições.
                  - listitem [ref=f1e340]:
                    - paragraph [ref=f1e341]: Manualmente mencionando um subagente em sua mensagem. Por exemplo.
                    - figure [ref=f1e343]:
                      - code [ref=f1e345]:
                        - generic [ref=f1e346]: "@general help me search for this function"
                      - button "Copy to clipboard" [ref=f1e349] [cursor=pointer]
              - listitem [ref=f1e351]:
                - paragraph [ref=f1e352]:
                  - strong [ref=f1e353]: Navegação entre sessões
                  - text: ": Quando subagentes criam suas próprias sessões filhas, você pode navegar entre a sessão pai e todas as sessões filhas usando:"
                - list [ref=f1e354]:
                  - listitem [ref=f1e355]:
                    - strong [ref=f1e356]: <Leader>+Right
                    - text: (ou sua tecla de atalho configurada
                    - code [ref=f1e357]: "`session_child_cycle`"
                    - text: ) para alternar para frente através de pai → child1 → child2 → … → pai
                  - listitem [ref=f1e358]:
                    - strong [ref=f1e359]: <Leader>+Left
                    - text: (ou sua tecla de atalho configurada
                    - code [ref=f1e360]: "`session_child_cycle_reverse`"
                    - text: ) para alternar para trás através de pai ← child1 ← child2 ← … ← pai
                - paragraph [ref=f1e361]: Isso permite que você mude perfeitamente entre a conversa principal e o trabalho especializado do subagente.
            - separator [ref=f1e362]
            - heading [level=2] [ref=f1e363]:
              - link "Configuração" [ref=f1e364]:
                - /url: "#configuração"
            - paragraph [ref=f1e365]: "Você pode personalizar os agentes integrados ou criar os seus próprios através da configuração. Os agentes podem ser configurados de duas maneiras:"
