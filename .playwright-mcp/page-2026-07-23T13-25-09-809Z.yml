            - heading [level=3] [ref=f1e551]:
              - link "Temperatura" [ref=f1e552]:
                - /url: "#temperatura"
            - paragraph [ref=f1e553]:
              - text: Controle a aleatoriedade e criatividade das respostas do LLM com a configuração
              - code [ref=f1e554]: "`temperature`"
              - text: .
            - paragraph [ref=f1e555]: Valores mais baixos tornam as respostas mais focadas e determinísticas, enquanto valores mais altos aumentam a criatividade e variabilidade.
            - figure "opencode.json" [ref=f1e557]:
              - code [ref=f1e561]:
                - generic [ref=f1e562]: "{"
                - generic [ref=f1e564]: "\"agent\": {"
