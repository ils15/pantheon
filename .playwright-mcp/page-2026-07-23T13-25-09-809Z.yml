              - button "Copy to clipboard" [ref=f1e637] [cursor=pointer]
            - paragraph [ref=f1e639]: Se nenhuma temperatura for especificada, o opencode usa padrões específicos do modelo; tipicamente 0 para a maioria dos modelos, 0.55 para modelos Qwen.
            - separator [ref=f1e640]
            - heading [level=3] [ref=f1e641]:
              - link "Máximo de etapas" [ref=f1e642]:
                - /url: "#máximo-de-etapas"
            - paragraph [ref=f1e643]: Controle o número máximo de iterações que um agente pode realizar antes de ser forçado a responder apenas com texto. Isso permite que usuários que desejam controlar custos definam um limite nas ações do agente.
            - paragraph [ref=f1e644]: Se isso não for definido, o agente continuará a iterar até que o modelo decida parar ou o usuário interrompa a sessão.
            - figure "opencode.json" [ref=f1e646]:
              - code [ref=f1e650]:
                - generic [ref=f1e651]: "{"
                - generic [ref=f1e653]: "\"agent\": {"
                - generic [ref=f1e655]: "\"quick-thinker\": {"
                - generic [ref=f1e657]: "\"description\": \"Raciocínio rápido com iterações limitadas\","
                - generic [ref=f1e659]: "\"prompt\": \"Você é um pensador rápido. Resolva problemas com etapas mínimas.\","
