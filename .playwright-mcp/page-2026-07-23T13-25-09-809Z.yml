                - text: (allow), mas como
                - code [ref=f1e1255]: "`orchestrator-*`"
                - text: vem depois de
                - code [ref=f1e1256]: "`*`"
                - text: ", o resultado é"
                - code [ref=f1e1257]: "`allow`"
