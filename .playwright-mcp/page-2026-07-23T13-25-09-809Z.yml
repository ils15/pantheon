            - paragraph [ref=f1e782]:
              - text: O ID do modelo em sua configuração do opencode usa o formato
              - code [ref=f1e783]: "`provider/model-id`"
              - text: . Por exemplo, se você estiver usando
              - link "OpenCode Zen" [ref=f1e784] [cursor=pointer]:
                - /url: /docs/zen
              - text: ", você usaria"
              - code [ref=f1e785]: "`opencode/gpt-5.1-codex`"
              - text: para GPT 5.1 Codex.
