    tools:
      delegate_agent: null
      run_terminal: "copilot-cli task"
      web_fetch: null
    capabilities:
      - terminal_execution
      - background_tasks

  continue_dev:
    display_name: "Continue.dev"
    tools:
      delegate_agent: "@agent"
      search_codebase: "search"
      read_file: "read"
      edit_file: "edit"
      run_terminal: "run"
      web_fetch: "fetch"
    capabilities:
      - agent_delegation
      - file_editing
      - terminal_execution
      - web_fetch

# =============================================================================
# ARTIFACT LIFECYCLE
# Maps agent outputs to artifact types and persistence rules
# Reference: instructions/artifact-protocol.instructions.md
# =============================================================================
artifacts:
  plan:
    prefix: PLAN
    location: ".pantheon/memory-bank/.tmp/"
    ephemeral: true
    produced_by:
      - athena
    persistence: "Deleted on sprint close (@mnemosyne Close sprint)"
    gate: "Human approval required before execution"

  implementation:
    prefix: IMPL
    location: ".pantheon/memory-bank/.tmp/"
    ephemeral: true
    produced_by:
      - hermes
      - aphrodite
      - demeter
    persistence: "Deleted on sprint close (@mnemosyne Close sprint)"
    gate: "Themis review required"

  review:
    prefix: REVIEW
    location: ".pantheon/memory-bank/.tmp/"
    ephemeral: true
    produced_by:
      - themis
    persistence: "Deleted on sprint close (@mnemosyne Close sprint)"
    gate: "Human validation of Review Focus items required"

  discussion:
    prefix: DISC
    location: ".pantheon/memory-bank/.tmp/"
    ephemeral: true
    produced_by:
      - apollo
    persistence: "Deleted on sprint close (@mnemosyne Close sprint)"
    gate: "Human approval after reading synthesis"

  decision_record:
    prefix: ADR
    location: ".pantheon/memory-bank/_notes/"
    ephemeral: false
    produced_by:
      - any
    persistence: "Permanent, never deleted"
    gate: "Explicit user request for documentation"

  subtask:
    prefix: none
    location: inline
    ephemeral: true
    produced_by:
      - apollo
      - talos
    persistence: "No artifact — returned as subtask_summary inline"
    gate: "No Themis review required. Bounded scope only: ≤2 files, <10 lines, low risk."
    notes: "Subtask skips the standard artifact lifecycle. See commands/subtask.md and prompts/subtask.prompt.md"

# =============================================================================
# ROUTING MATRIX (QUICK REFERENCE)
# Summary table matching task categories to primary agents
# =============================================================================
routing_matrix:
  # Planning & Research
  - category: "Strategic planning"
    primary_agent: athena
    parallel_with: [apollo]

  - category: "Codebase discovery"
    primary_agent: apollo

  - category: "Architecture decisions"
    primary_agent: zeus

  - category: "Multi-perspective analysis"
    primary_agent: zeus

  - category: "System config (agent files, routing.yml, commands)"
    primary_agent: talos
    notes: "Small changes (1-2 files, <10 lines) → talos. Larger changes → hermes."

  # Implementation
  - category: "Backend / API"
    primary_agent: hermes
    parallel_with: [aphrodite, demeter]

  - category: "Frontend / UI"
    primary_agent: aphrodite
    parallel_with: [hermes, demeter]

  - category: "Database / Schema"
    primary_agent: demeter
    parallel_with: [hermes, aphrodite]

  # Specialized
  - category: "AI pipelines / RAG"
    primary_agent: hephaestus

  - category: "Remote sensing / geospatial"
    primary_agent: gaia

  # Infrastructure
  - category: "Docker / deployment"
    primary_agent: prometheus

  - category: "CI/CD pipelines"
    primary_agent: prometheus

  # Quality & Operations
  - category: "Code review / quality gate"
    primary_agent: themis

  - category: "Security audit"
    primary_agent: themis

  - category: "GitHub operations"
    primary_agent: iris

  - category: "Context compression / artifact archival"
    primary_agent: mnemosyne
    notes: "Called by Zeus after Themis APPROVED — compresses subtask_summaries, archives IMPL/REVIEW"

  - category: "Documentation / memory"
    primary_agent: mnemosyne

  - category: "Observability / monitoring"
    primary_agent: nyx

  # Rapid Response
  - category: "Hotfix / bug fix"
    primary_agent: talos

  - category: "Orchestration"
    primary_agent: zeus

# =============================================================================
# MODEL FALLBACK CHAINS
# =============================================================================
# When an agent's primary model is rate-limited (429) or unavailable,
# the platform should attempt the next model in the chain.
# Chain pattern: Primary → Secondary → Emergency
# These chains are advisory — the platform's model routing determines
# actual fallback behavior at runtime.

fallback_chains:
  premium_agents:                # athena, themis
    primary: "anthropic/claude-sonnet-4-20250514"
    secondary: "openai/gpt-5.1"
    emergency: "deepseek/deepseek-v4-pro"

  default_agents:                # zeus, hermes, aphrodite, demeter, prometheus, hephaestus, gaia
    primary: "anthropic/claude-sonnet-4-20250514"
    secondary: "openai/gpt-4o"
    emergency: "deepseek/deepseek-v4-pro"

  fast_agents:                   # apollo, nyx, iris, mnemosyne, talos
    primary: "deepseek/deepseek-v4-pro"
    secondary: "anthropic/claude-haiku-4-20250514"
    emergency: "openai/gpt-4o-mini"

  agent_overrides:
    gaia:                        # Remote sensing needs vision
      primary: "anthropic/claude-sonnet-4-20250514"
      secondary: "openai/gpt-4o"
      emergency: "deepseek/deepseek-v4-pro"
