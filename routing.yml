# =============================================================================
# AUTO-CONTINUE CONFIGURATION
# Checkpoint and heartbeat settings for autonomous sessions
# =============================================================================
auto_continue:
  checkpoint_script: ".pantheon/code-mode/checkpoint-session.sh"
  heartbeat_interval: 5
  idle:
    warning: 60
    stall: 120
    pause: 300

# =============================================================================
# DELEGATION RULES — who delegates to whom, when (task categories), how (timeout/retry/fallback)
# Each orchestrator has its own delegation targets. Fields: target, when, prompt_hint.
# Aspirational fields (timeout, retry_count, fallback_agent, etc.) removed — not
# enforced programmatically. See instructions/zeus-timeout-retry.instructions.md for defaults.
# =============================================================================
delegation:
  # --- ZEUS (primary orchestrator) ---
  zeus:
    - target: athena
      when:
        - feature_planning
        - architectural_design
        - root_cause_analysis
        - deep_research
        - risk_assessment
      prompt_hint: "Create an implementation plan for this feature."

    - target: apollo
      when:
        - codebase_discovery
        - dependency_research
        - file_search
        - pattern_discovery
        - codemap_generation
        - pre_planning_research
      prompt_hint: "Find all files related to [topic] and return structured findings."

    - target: hermes
      when:
        - backend_implementation
        - api_development
        - service_layer
        - async_python_code
        - business_logic
      prompt_hint: "Implement the backend components following TDD methodology."

    - target: aphrodite
      when:
        - frontend_implementation
        - ui_component
        - visual_update
        - accessibility_improvement
        - responsive_layout
      prompt_hint: "Implement the frontend components following TDD methodology."

    - target: demeter
      when:
        - database_migration
        - schema_change
        - query_optimization
        - n_plus_one_fix
        - index_strategy
      prompt_hint: "Create database migrations and schema changes for this feature."

    - target: themis
      when:
        - code_review
        - security_audit
        - quality_gate
        - pre_merge_review
        - plan_validation
      prompt_hint: "Validate implementation for correctness, security, test coverage, and quality."

    - target: prometheus
      when:
        - infrastructure_change
        - docker_configuration
        - ci_cd_pipeline
        - deployment_strategy
        - environment_setup
      prompt_hint: "Set up infrastructure and deployment configuration for this feature."

    - target: hephaestus
      when:
        - rag_pipeline
        - langchain_workflow
        - vector_search
        - embedding_strategy
        - ai_workflow_orchestration
      prompt_hint: "Build AI tooling pipelines (RAG, LangChain chains, vector search)."

    - target: nyx
      when:
        - observability_setup
        - monitoring_configuration
        - cost_tracking
        - opentelemetry_instrumentation
        - alerting
      prompt_hint: "Set up observability, tracing, and cost tracking."

    - target: gaia
      when:
        - remote_sensing_analysis
        - satellite_imagery
        - land_cover_classification
        - spectral_analysis
        - geospatial_pipeline
      prompt_hint: "Perform remote sensing analysis and geospatial data processing."

    - target: iris
      when:
        - github_operations
        - pull_request_creation
        - branch_management
        - release_publishing
        - issue_management
      prompt_hint: "Perform GitHub operations (branches, PRs, releases)."

    - target: mnemosyne
      when:
        - documentation
        - memory_bank_update
        - artifact_persistence
        - adr_creation
        - sprint_close
      prompt_hint: "Document the completed work and decisions in the Memory Bank."

    - target: mnemosyne
      when:
        - context_compression
      prompt_hint: "Compress completed phase artifacts and archive to memory bank."

    - target: talos
      when:
        - hotfix
        - minor_bug_fix
        - css_repair
        - typo_correction
        - urgent_bounded_change
      prompt_hint: "Fix this minor issue quickly — no TDD ceremony needed."

  # --- ATHENA ---
  athena:
    - target: themis
      when:
        - plan_validation
      prompt_hint: "Validate this plan for completeness, risk coverage, and test strategy."

    - target: zeus
      when:
        - handoff_to_execution
      prompt_hint: "Implement the plan outlined above following TDD methodology."

  # --- APOLLO ---
  apollo:
    - target: zeus
      when:
        - return_to_orchestrator
      prompt_hint: "Process these discovery findings and proceed with orchestration."

    - target: athena
      when:
        - support_planning
      prompt_hint: "Use these findings to refine or complete the plan."

  # --- HERMES ---
  hermes:
    - target: themis
      when:
        - post_implementation_review
      prompt_hint: "Perform code review and security audit on these backend changes."

  # --- APHRODITE ---
  aphrodite:
    - target: themis
      when:
        - post_implementation_review
      prompt_hint: "Perform code review and accessibility audit on these frontend changes."

  # --- DEMETER ---
  demeter:
    - target: themis
      when:
        - post_implementation_review
      prompt_hint: "Perform code review and security audit on these database/migration changes."

  # --- PROMETHEUS ---
  prometheus:
    - target: themis
      when:
        - post_implementation_validation
      prompt_hint: "Validate these infrastructure changes for best practices, security, and correctness."

  # --- THEMIS ---
  themis:
    - target: zeus
      when:
        - escalate_blockers
        - fix_issues
      prompt_hint: "Fix the issues identified in the code review above."

    - target: mnemosyne
      when:
        - document_findings
      prompt_hint: "Document the review findings in the Memory Bank."

  # --- HEPHAESTUS ---
  hephaestus:
    - target: themis
      when:
        - post_implementation_review
      prompt_hint: "Review this AI pipeline for correctness, security, and performance."

    - target: prometheus
      when:
        - deploy_pipeline
      prompt_hint: "Deploy this AI pipeline — consider GPU requirements and inference health checks."

  # --- GAIA ---
  gaia:
    - target: themis
      when:
        - post_analysis_review
      prompt_hint: "Review this remote sensing analysis for methodological correctness and scientific validity."

    - target: athena
      when:
        - plan_implementation
      prompt_hint: "Create an implementation plan based on this remote sensing analysis."

  # --- NYX ---
  nyx:
    - target: zeus
      when:
        - report_anomaly
      prompt_hint: "Observability detected anomalies. Review and decide on corrective action."

  # --- IRIS ---
  iris:
    - target: zeus
      when:
        - merge_approval
      prompt_hint: "PR awaiting merge approval. Review and reply 'merge' to proceed."

    - target: mnemosyne
      when:
        - document_release
      prompt_hint: "Update the memory bank with the release information."

  # --- TALOS ---
  talos:
    - target: zeus
      when:
        - escalate_complex
      prompt_hint: "This fix exceeds hotfix scope. Please take over."

# =============================================================================
# HANDOFF DEFINITIONS — named, labeled, with description and prompt
# Structured handoff contracts that agents use for delegation
# =============================================================================
handoffs:
  zeus:
    plan_feature:
      label: "📋 Plan Feature"
      description: "Strategic planning with TDD-driven implementation phases"
      agent: athena
      prompt: "Create an implementation plan for this feature."

    validate_plan:
      label: "🔍 Validate Plan"
      description: "Pre-execution plan validation for risk coverage and test strategy"
      agent: themis
      prompt: "Validate the plan before execution: coverage, risks, test strategy."

    document_progress:
      label: "📝 Document Progress"
      description: "Memory bank update and artifact persistence"
      agent: mnemosyne
      prompt: "Document the completed work and decisions in the Memory Bank."

    build_ai_pipelines:
      label: "🔧 Build AI Pipelines"
      description: "RAG, LangChain chains, vector search implementation"
      agent: hephaestus
      prompt: "Build AI tooling pipelines (RAG, LangChain chains, vector search)."

    setup_observability:
      label: "👁️ Set Up Observability"
      description: "OpenTelemetry tracing, cost tracking, monitoring"
      agent: nyx
      prompt: "Set up observability, tracing, and cost tracking."

    visual_fix:
      label: "🔧 Fix Visual Issues"
      description: "Re-delegate visual fixes to Aphrodite (self-review loop)"
      agent: aphrodite
      prompt: "Fix these visual issues identified in self-review: [issues]"

    compress_context:
      label: "🗜️ Compress Context"
      description: "Compress completed subtask_summaries and archive IMPL/REVIEW artifacts after Themis approval"
      agent: mnemosyne
      prompt: "Compress completed phase artifacts (Level 2): create ZZ-phase{N}-context.md with priority-scored entries, write compressed entries to 01-active-context.md (priority-aware, budget-allocated), archive IMPL/REVIEW to 02-progress-log.md, update _xref/index.md cross-references."

  athena:
    validate_plan:
      label: "Validate Plan"
      description: "Plan quality validation before execution"
      agent: themis
      prompt: "Validate this implementation plan for completeness and risk coverage."

    implement_plan:
      label: "Implement Plan"
      description: "Handoff approved plan to Zeus for execution"
      agent: zeus
      prompt: "Implement the plan outlined above following TDD methodology."

  themis:
    fix_issues:
      label: "🔧 Fix Review Issues"
      description: "Escalate non-trivial issues to Zeus for re-delegation"
      agent: zeus
      prompt: "Fix the issues identified in the code review above."

    document_findings:
      label: "📝 Document Findings"
      description: "Persist review findings in Memory Bank"
      agent: mnemosyne
      prompt: "Document the review findings in the Memory Bank."

  hermes:
    send_to_themis:
      label: "➡️ Send to Themis"
      description: "Post-implementation code review and security audit"
      agent: themis
      prompt: "Perform code review and security audit on these backend changes."

  aphrodite:
    send_to_themis:
      label: "➡️ Send to Themis"
      description: "Post-implementation review with accessibility audit"
      agent: themis
      prompt: "Perform code review and accessibility audit on these frontend changes."

    visual_review:
      label: "👁️ Visual Review (Self)"
      description: "Self-review screenshot for visual issues"
      agent: aphrodite
      prompt: "Analyze your own screenshot for visual issues. Return structured JSON."

    visual_escalate:
      label: "🚨 Escalate Visual Issues"
      description: "Escalate persistent visual issues to Zeus"
      agent: zeus
      prompt: "Visual review pipeline failed after 3 iterations. Requires architectural changes."

  demeter:
    send_to_themis:
      label: "➡️ Send to Themis"
      description: "Post-implementation database review"
      agent: themis
      prompt: "Perform code review and security audit on these database/migration changes."

  apollo:
    return_to_zeus:
      label: "📊 Return Findings to Zeus"
      description: "Deliver discovery results to orchestrator"
      agent: zeus
      prompt: "Process these discovery findings and proceed with orchestration."

    return_to_athena:
      label: "📊 Return Findings to Athena"
      description: "Deliver discovery results to planner"
      agent: athena
      prompt: "Use these findings to refine or complete the plan."

  prometheus:
    validate_infrastructure:
      label: "➡️ Validate Infrastructure"
      description: "Infrastructure best practices and security validation"
      agent: themis
      prompt: "Validate these infrastructure changes for best practices and security."

  hephaestus:
    review_pipeline:
      label: "🔍 Review Pipeline"
      description: "AI pipeline correctness and security review"
      agent: themis
      prompt: "Review this AI pipeline for correctness, security, and performance."

    deploy_pipeline:
      label: "📊 Deploy Pipeline"
      description: "AI pipeline deployment with GPU considerations"
      agent: prometheus
      prompt: "Deploy this AI pipeline — consider GPU requirements and health checks."

  gaia:
    review_analysis:
      label: "🔍 Review Analysis"
      description: "Remote sensing methodological review"
      agent: themis
      prompt: "Review this remote sensing analysis for methodological correctness."

    plan_implementation:
      label: "📋 Plan Implementation"
      description: "Plan implementation based on remote sensing analysis"
      agent: athena
      prompt: "Create an implementation plan based on this remote sensing analysis."

  nyx:
    report_anomaly:
      label: "🌀 Report Anomaly"
      description: "Escalate observability anomalies to orchestrator"
      agent: zeus
      prompt: "Observability detected anomalies. Review and decide on corrective action."

  iris:
    merge_pr:
      label: "Merge PR"
      description: "Request merge approval from orchestrator"
      agent: zeus
      prompt: "PR awaiting approval to merge. Review and reply 'merge' to proceed."

    document_release:
      label: "Document release"
      description: "Persist release information in Memory Bank"
      agent: mnemosyne
      prompt: "Update the memory bank with the release information."

  talos:
    escalate_to_zeus:
      label: "🚨 Escalate to Zeus"
      description: "Escalate complex issues beyond hotfix scope"
      agent: zeus
      prompt: "This fix exceeds hotfix scope. Please take over."

