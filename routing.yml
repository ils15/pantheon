# =============================================================================
# routing.yml — Canonical Routing Source for Pantheon
# Version: 1.0
# Purpose: Single source of truth for agent routing, delegation rules, and handoff contracts
# Maintainer: Pantheon Agent System
# =============================================================================

version: 1.0

# =============================================================================
# Quick Reference — Primary Delegation Flow
# =============================================================================
# ```mermaid
# ---
# config:
#   look: classic
#   theme: dark
# ---
# flowchart LR
#     Z[Zeus] --> A[Athena] --> AP[Apollo]
#     Z --> H[Hermes] --> T[Themis]
#     Z --> PH[Aphrodite] --> T
#     Z --> D[Demeter] --> T
#     Z --> R[Prometheus]
#     Z --> HE[Hephaestus]
#     Z --> N[Nyx]
#     Z --> G[Gaia]
#     Z --> I[Iris] --> M[Mnemosyne]
#     Z --> M
#     Z -.-> TA[Talos]
#     T --> I
#     T --> M
# ```
# =============================================================================
# Removed agents: argus, chiron, echo (merged/deprecated)
# =============================================================================

# =============================================================================
# AGENT REGISTRY — 14 active agents
# =============================================================================
agents:
  zeus:
    role: "Central orchestrator — delegates to specialists, never implements"
    model_tier: default
    reasoning_effort: medium
    user_invocable: true
    can_delegate: true
    can_receive_delegation: true
    capabilities:
      - orchestration
      - delegation
      - context_conservation
      - context_compression
      - phase_management
      - quality_gate_enforcement
      - memory_recall
      - pantheon_resources
      - pantheon_code_mode
      - pantheon_deepwork
    subagent_can_delegate_to:
      - athena
      - apollo
      - hermes
      - aphrodite
      - demeter
      - themis
      - prometheus
      - hephaestus
      - nyx
      - gaia
      - iris
      - mnemosyne
      - talos
    skills:
      - agent-coordination
      - session-goal
      - artifact-management
      - context-compression
      - auto-continue
      - internet-search
      - orchestration-workflow

  athena:
