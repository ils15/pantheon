name: Create GitHub Release (Manual)

# Manual-only trigger for re-releasing an existing tag or releasing a tag that
# was created outside of the auto-release pipeline.
#
# Usage: Actions → "Create GitHub Release (Manual)" → Run workflow → enter tag
# The tag must already exist in the repo.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v3.5.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build bundle and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Validate version matches tag
        run: |
          set -e
          TAG="${{ inputs.tag }}"
          EXPECTED="${TAG#v}"
          pkg=$(node -p "require('./package.json').version")
          root_plugin=$(node -p "require('./plugin.json').version")
          gh_plugin=$(node -p "require('./.github/plugin/plugin.json').version")
          [ "$pkg" = "$root_plugin" ] || { echo "❌ package.json ($pkg) ≠ plugin.json ($root_plugin)"; exit 1; }
          [ "$pkg" = "$gh_plugin" ]    || { echo "❌ package.json ($pkg) ≠ .github/plugin/plugin.json ($gh_plugin)"; exit 1; }
          [ "$pkg" = "$EXPECTED" ]     || { echo "❌ package.json ($pkg) ≠ tag ($EXPECTED)"; exit 1; }
          echo "✅ All versions match: $pkg"

      - name: Sync platforms
        run: npm run sync

      - name: Build release bundle
        run: npm run bundle

      - name: Extract release notes
        id: notes
        run: |
          TAG="${{ inputs.tag }}"
          notes=$(awk -v ver="$TAG" '
            /^\#\# \[/ {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$notes" > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          # Delete existing release if present (re-run scenario)
          gh release delete "${TAG}" --yes 2>/dev/null || true

          gh release create "${TAG}" \
            --title "Pantheon ${TAG}" \
            --notes-file release_notes.md \
            "dist/pantheon-${TAG}.tar.gz"

          echo "✅ Published Pantheon ${TAG}"
