name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  sync-and-release:
    name: Sync platforms then create release from CHANGELOG.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Validate version matches tag
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="${TAG#v}"
          pkg=$(node -p "require('./package.json').version")
          root_plugin=$(node -p "require('./plugin.json').version")
          gh_plugin=$(node -p "require('./.github/plugin/plugin.json').version")
          echo "Tag: $TAG"
          echo "Expected: $EXPECTED"
          echo "package.json: $pkg"
          echo "plugin.json: $root_plugin"
          echo ".github/plugin/plugin.json: $gh_plugin"
          [ "$pkg" = "$root_plugin" ] || { echo "❌ package.json and plugin.json out of sync"; exit 1; }
          [ "$pkg" = "$gh_plugin" ] || { echo "❌ package.json and .github/plugin/plugin.json out of sync"; exit 1; }
          [ "$pkg" = "$EXPECTED" ] || { echo "❌ Version ($pkg) != tag ($TAG)"; exit 1; }
          echo "✅ Versions synchronized and match tag"

      - name: Regenerate platform configs before release
        run: npm run sync

      - name: Extract release notes for this version
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"   # e.g. v2.5.0

          # Find the block in CHANGELOG.md for this version.
          # Sections start with "## [vX.Y.Z]" and end before the next "## [" or EOF.
          notes=$(awk -v ver="$VERSION" '
            /^\#\# \[/ {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            echo "⚠️  No entry found for $VERSION in CHANGELOG.md — using generic message."
            notes="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # Write to a file to avoid shell escaping issues with multiline strings
          echo "$notes" > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Build release bundle
        run: |
          mkdir -p dist
          node scripts/release-bundle.mjs --output ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pantheon ${{ github.ref_name }}"
          body_path: "${{ steps.notes.outputs.notes_file }}"
          files: |
            dist/pantheon-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
