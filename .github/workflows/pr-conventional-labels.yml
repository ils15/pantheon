name: PR Conventional Labels

'on':
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-by-title:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels from PR title
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = (pr?.title || '').trim();

            // Conventional Commit style: type(scope)!: subject
            const m = title.match(/^([a-zA-Z]+)(\([^\)]+\))?(!)?:\s+/);
            if (!m) {
              core.info(`No conventional prefix found in title: "${title}"`);
              return;
            }

            const type = m[1].toLowerCase();
            const breaking = Boolean(m[3]);

            const map = {
              feat: ['feature', 'minor'],
              fix: ['fix', 'patch'],
              docs: ['docs', 'patch'],
              chore: ['chore', 'patch'],
              refactor: ['refactor', 'patch'],
              ci: ['ci', 'patch'],
              perf: ['patch'],
              test: ['patch'],
              build: ['patch'],
              style: ['patch'],
            };

            let desired = [...(map[type] || [])];
            if (breaking) {
              desired = desired.filter(l => l !== 'patch' && l !== 'minor');
              desired.push('breaking-change', 'major');
            }

            if (desired.length === 0) {
              core.info(`No label mapping for type: ${type}`);
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = pr.number;

            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            const available = new Set(repoLabels.map(l => l.name));
            const labelsToAdd = desired.filter(l => available.has(l));

            if (labelsToAdd.length === 0) {
              core.info(`Mapped labels not found in repository: ${desired.join(', ')}`);
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: labelsToAdd,
            });

            core.info(`Applied labels from title: ${labelsToAdd.join(', ')}`);
