name: Validate Agent Files

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'opencode/agents/**'
      - 'platform/**'
      - 'AGENTS.md'

jobs:
  validate-frontmatter:
    name: Validate agent frontmatter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent-dir:
          - 'agents/*.agent.md'
          - 'opencode/agents/*.md'
          - 'platform/claude/agents/*.md'
          - 'platform/opencode/agents/*.md'
          - 'platform/windsurf/agents/*.md'
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML frontmatter
        run: |
          set -e
          FAILED=0

          glob="${{ matrix.agent-dir }}"
          echo "🔍 Validating: $glob"

          for file in $glob; do
            [ -f "$file" ] || { echo "⚠️  No files matched: $glob"; continue; }

            frontmatter=$(awk '/^---/{if(found){exit}else{found=1;next}} found{print}' "$file")

            if [ -z "$frontmatter" ]; then
              echo "❌ No frontmatter found in $file"
              FAILED=1
              continue
            fi

            tmpfile=$(mktemp --suffix=.yml)
            echo "$frontmatter" > "$tmpfile"

            if yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" "$tmpfile"; then
              echo "✅ $file — frontmatter OK"
            else
              echo "❌ $file — frontmatter has YAML errors"
              FAILED=1
            fi

            rm "$tmpfile"
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "One or more agent files have invalid frontmatter. Fix the YAML errors before merging."
            exit 1
          fi

  check-agent-consistency:
    name: Check AGENTS.md ↔ agents/ consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every agent in AGENTS.md has a .agent.md file
        run: |
          set -e
          FAILED=0

          referenced=$(grep -oP '\(agents/\K[^)]+(?=\.agent\.md\))' AGENTS.md | sort -u)

          for name in $referenced; do
            if [ ! -f "agents/${name}.agent.md" ]; then
              echo "❌ AGENTS.md references '${name}' but agents/${name}.agent.md does not exist"
              FAILED=1
            else
              echo "✅ agents/${name}.agent.md — exists"
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Create the missing .agent.md files or remove the stale references in AGENTS.md."
            exit 1
          fi

      - name: Verify every VS Code agent is documented in AGENTS.md
        run: |
          set -e
          FAILED=0

          for file in agents/*.agent.md; do
            basename=$(basename "$file" .agent.md)
            if ! grep -q "(agents/${basename}.agent.md)" AGENTS.md; then
              echo "⚠️  agents/${basename}.agent.md exists but is not referenced in AGENTS.md"
              FAILED=1
            else
              echo "✅ ${basename} — documented in AGENTS.md"
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Add documentation for the undocumented agents in AGENTS.md."
            exit 1
          fi

      - name: Verify every OpenCode agent is documented in AGENTS.md
        run: |
          set -e
          FAILED=0

          for file in opencode/agents/*.md; do
            basename=$(basename "$file" .md)
            if ! grep -q "(opencode/agents/${basename})" AGENTS.md; then
              echo "⚠️  opencode/agents/${basename} exists but is not referenced in AGENTS.md"
              FAILED=1
            else
              echo "✅ opencode/${basename} — documented in AGENTS.md"
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Add documentation for the undocumented OpenCode agents in AGENTS.md."
            exit 1
          fi

  validate-sync:
    name: Validate platform sync freshness
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Check if platforms are in sync with canonical agents
        run: |
          set -e
          echo "🔍 Checking platform sync freshness..."

          npm run sync:check 2>&1 || {
            echo ""
            echo "❌ Platforms are out of sync with canonical agents."
            echo "   Run 'npm run sync' locally and commit the results."
            exit 1
          }

          echo "✅ All platforms are in sync with canonical agents."
