name: Sync Check

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'platforms/**'
      - 'scripts/sync-platforms.mjs'
      - 'scripts/lib/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-sync:
    name: Check platform sync freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if platforms are in sync with canonical agents
        run: |
          set -e

          # If sync script doesn't exist yet, skip (pre-Fase 1)
          if [ ! -f "scripts/sync-platforms.mjs" ]; then
            echo "⚠️  Sync engine not yet available — skipping sync check."
            exit 0
          fi

          # Run sync in dry-run mode to detect drift
          npm run sync:check 2>&1 || {
            echo ""
            echo "❌ Platforms are out of sync with canonical agents."
            echo "   Run 'npm run sync' locally and commit the results."
            exit 1
          }

          echo "✅ All platforms are in sync with canonical agents ($(ls agents/*.agent.md 2>/dev/null | wc -l) agents)."
