name: Verify Pushes

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate canonical frontmatter
        run: |
          set -e
          FAILED=0

          for file in agents/*.agent.md; do
            frontmatter=$(awk '/^---/{if(found){exit}else{found=1;next}} found{print}' "$file")
            if [ -z "$frontmatter" ]; then echo "❌ No frontmatter in $file"; FAILED=1; continue; fi
            tmpfile=$(mktemp --suffix=.yml)
            echo "$frontmatter" > "$tmpfile"
            if yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" "$tmpfile"; then
              echo "✅ $file — OK"
            else
              echo "❌ $file — YAML errors"; FAILED=1
            fi
            rm "$tmpfile"
          done

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: Validate OpenCode frontmatter
        run: |
          set -e
          FAILED=0

          for file in opencode/agents/*.md; do
            frontmatter=$(awk '/^---/{if(found){exit}else{found=1;next}} found{print}' "$file")
            if [ -z "$frontmatter" ]; then echo "❌ No frontmatter in $file"; FAILED=1; continue; fi
            tmpfile=$(mktemp --suffix=.yml)
            echo "$frontmatter" > "$tmpfile"
            if yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" "$tmpfile"; then
              echo "✅ $file — OK"
            else
              echo "❌ $file — YAML errors"; FAILED=1
            fi
            rm "$tmpfile"
          done

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: Validate generated platform frontmatter
        run: |
          set -e
          FAILED=0

          for dir in platforms/claude/agents platforms/opencode/agents platforms/windsurf/agents; do
            [ -d "$dir" ] || continue
            for file in "$dir"/*.md; do
              [ -f "$file" ] || continue
              frontmatter=$(awk '/^---/{if(found){exit}else{found=1;next}} found{print}' "$file")
              if [ -z "$frontmatter" ]; then echo "❌ No frontmatter in $file"; FAILED=1; continue; fi
              tmpfile=$(mktemp --suffix=.yml)
              echo "$frontmatter" > "$tmpfile"
              if yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" "$tmpfile"; then
                echo "✅ $file — OK"
              else
                echo "❌ $file — YAML errors"; FAILED=1
              fi
              rm "$tmpfile"
            done
          done

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: Validate VS Code platform (identity — via symlink)
        run: |
          set -e
          FAILED=0

          for file in platforms/vscode/agents/*.agent.md; do
            [ -f "$file" ] || continue
            frontmatter=$(awk '/^---/{if(found){exit}else{found=1;next}} found{print}' "$file")
            if [ -z "$frontmatter" ]; then echo "❌ No frontmatter in $file"; FAILED=1; continue; fi
            tmpfile=$(mktemp --suffix=.yml)
            echo "$frontmatter" > "$tmpfile"
            if yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" "$tmpfile"; then
              echo "✅ $file — OK"
            else
              echo "❌ $file — YAML errors"; FAILED=1
            fi
            rm "$tmpfile"
          done

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: Validate Cursor .mdc rules
        run: |
          set -e
          FAILED=0

          for file in platforms/cursor/rules/*.mdc; do
            [ -f "$file" ] || continue
            frontmatter=$(awk '/^---/{if(found){exit}else{found=1;next}} found{print}' "$file")
            if [ -z "$frontmatter" ]; then echo "❌ No frontmatter in $file"; FAILED=1; continue; fi
            tmpfile=$(mktemp --suffix=.yml)
            echo "$frontmatter" > "$tmpfile"
            if yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" "$tmpfile"; then
              echo "✅ $file — OK"
            else
              echo "❌ $file — YAML errors"; FAILED=1
            fi
            rm "$tmpfile"
          done

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Validate plugin manifest
        run: npm run plugin:validate

      - name: Validate platform adapter manifests
        run: |
          set -e
          FAILED=0

          for dir in platforms/*/; do
            adapter="${dir}adapter.json"
            [ -f "$adapter" ] || continue
            # Skip _template adapter — it's a reference, not a real platform
            basename "$dir" | grep -q '^_template' && continue
            if node -e "const a=require('./${adapter}'); ['name','displayName','outputDir'].forEach(k=>{if(!a[k])throw new Error('Missing '+k+' in '+a.name)})" 2>&1; then
              echo "✅ $(basename "$dir")/adapter.json — valid"
            else
              echo "❌ $(basename "$dir")/adapter.json — invalid"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: Verify identity sync (agents/ ↔ platforms/vscode/agents/)
        run: |
          set -e
          FAILED=0

          for file in agents/*.agent.md; do
            basename=$(basename "$file")
            platform_file="platforms/vscode/agents/${basename}"
            if [ -f "$platform_file" ]; then
              if diff "$file" "$platform_file" > /dev/null; then
                echo "✅ ${basename} — VS Code identity match"
              else
                echo "❌ ${basename} — VS Code identity MISMATCH"
                FAILED=1
              fi
            else
              echo "⚠️  ${basename} — missing in platforms/vscode/agents/"
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "VS Code platform is out of identity sync with canonical agents."
            echo "Run 'npm run sync' to regenerate."
            exit 1
          fi
