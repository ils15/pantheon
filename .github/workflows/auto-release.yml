name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-release:
    name: Detect changes and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Check for release-worthy commits
        id: check
        run: |
          # Get last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags found. First release."
            echo "has_commits=true" >> $GITHUB_OUTPUT
          else
            # Check if there are feat/fix/BREAKING commits since last tag
            COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"%s" --no-merges)
            if echo "$COMMITS" | grep -qE "^(feat|fix|BREAKING)"; then
              echo "has_commits=true" >> $GITHUB_OUTPUT
            else
              echo "No release-worthy commits since $LAST_TAG"
              echo "has_commits=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Determine version bump
        id: bump
        if: steps.check.outputs.has_commits == 'true'
        run: |
          # Determine bump type from commits
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"%s" --no-merges)
            
            if echo "$COMMITS" | grep -qE "^[a-z]+!:" || echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
              echo "bump=major" >> $GITHUB_OUTPUT
            elif echo "$COMMITS" | grep -q "^feat:"; then
              echo "bump=minor" >> $GITHUB_OUTPUT
            else
              echo "bump=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate changelog and bump version
        if: steps.check.outputs.has_commits == 'true'
        run: |
          # Use changelogen to generate changelog and bump version
          npx changelogen --bump --output CHANGELOG.md
          
          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=v${NEW_VERSION}" >> $GITHUB_ENV

      - name: Update platform configs
        if: steps.check.outputs.has_commits == 'true'
        run: npm run sync

      - name: Commit, tag and push release branch
        if: steps.check.outputs.has_commits == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag "${NEW_VERSION}"
          
          # Push tag (tags bypass branch protection)
          git push origin "${NEW_VERSION}"
          
          # Push release branch instead of pushing to main directly
          # (main is protected and requires PRs)
          BRANCH="release/${NEW_VERSION}"
          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}"

      - name: Create Pull Request with auto-merge
        if: steps.check.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="release/${NEW_VERSION}"
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(release): ${NEW_VERSION}" \
            --body "Automated release PR for Pantheon **${NEW_VERSION}**.\n\nThe GitHub Release has already been published. Merging this PR syncs main with the version bump and changelog update." \
            --json url --jq '.url')
          
          echo "PR created: $PR_URL"
          
          # Enable auto-merge with squash strategy
          gh pr merge "${BRANCH}" --auto --squash
          echo "✅ Auto-merge enabled for $PR_URL"

      - name: Install git-cliff
        if: steps.check.outputs.has_commits == 'true'
        run: |
          # Download git-cliff binary for CI
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-musl.tar.gz -o /tmp/git-cliff.tar.gz
          cd /tmp && tar xzf git-cliff.tar.gz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/
          git-cliff --version

      - name: Generate release notes
        id: notes
        if: steps.check.outputs.has_commits == 'true'
        run: |
          TAG="${NEW_VERSION}"
          git-cliff --config cliff.toml --tag "$TAG" -o release_notes.md
          echo "Generated release notes for $TAG"

      - name: Create GitHub Release
        if: steps.check.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${NEW_VERSION}"

          # Build bundle
          npm run bundle

          # Create release
          gh release create "${TAG}" \
            --title "Pantheon ${TAG}" \
            --notes-file release_notes.md \
            "dist/pantheon-${TAG}.tar.gz"

          echo "✅ Published Pantheon ${TAG}"
