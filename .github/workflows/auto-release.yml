name: Auto Release

# Fires after CI passes on main.
# Only creates a release when package.json version > latest git tag.
# Version bumping is done locally via: node scripts/versioning.mjs apply
# This workflow NEVER modifies package.json.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    # Only run if CI passed and not a [skip ci] commit
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install

      - name: Check if version bump is pending
        id: check
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          # Use the numerically highest tag, not just the nearest ancestor
          LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -1)
          LATEST_TAG="${LATEST_TAG:-v0.0.0}"
          LATEST_VER="${LATEST_TAG#v}"

          echo "package.json version : $PKG_VER"
          echo "latest git tag       : $LATEST_TAG"

          if [ "$PKG_VER" = "$LATEST_VER" ]; then
            echo "No version bump detected — skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Version bump detected: $LATEST_VER → $PKG_VER — will release v$PKG_VER"
            echo "should_release=true"  >> $GITHUB_OUTPUT
            echo "version=$PKG_VER"     >> $GITHUB_OUTPUT
            echo "tag=v$PKG_VER"        >> $GITHUB_OUTPUT
          fi

      - name: Sync platforms
        if: steps.check.outputs.should_release == 'true'
        run: npm run sync

      - name: Build release bundle
        if: steps.check.outputs.should_release == 'true'
        run: npm run bundle

      - name: Extract release notes from CHANGELOG
        if: steps.check.outputs.should_release == 'true'
        id: notes
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          notes=$(awk -v ver="$TAG" '
            /^\#\# \[/ {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$notes" > release_notes.md
          cat release_notes.md

      - name: Tag and publish release
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${{ steps.check.outputs.version }}"

          # Safety net: abort if tag already exists
          if git tag -l "${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists — release already published, skipping."
            exit 0
          fi

          git config user.name "pantheon-bot"
          git config user.email "bot@pantheon.ai"

          # Tag HEAD of main (the bump commit is already on main)
          git tag "${TAG}"
          git push origin "${TAG}"

          # Create GitHub release
          gh release create "${TAG}" \
            --title "Pantheon ${TAG}" \
            --notes-file release_notes.md \
            "dist/pantheon-${TAG}.tar.gz"

          echo "✅ Released Pantheon ${TAG}"
