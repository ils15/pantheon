name: Version Recommendation

'on':
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute version recommendation
        id: rec
        run: |
          set -e
          out=$(npm run -s version:recommend)
          echo "$out"

          current=$(echo "$out" | awk -F': ' '/^Current:/{print $2}')
          bump=$(echo "$out" | awk -F': ' '/^Recommended bump:/{print $2}')
          next=$(echo "$out" | awk -F': ' '/^Next:/{print $2}')

          {
            echo "current=$current"
            echo "bump=$bump"
            echo "next=$next"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pantheon-version-recommendation -->';
            const body = `${marker}
            ## Version Recommendation

            - Current: **${{ steps.rec.outputs.current }}**
            - Recommended bump: **${{ steps.rec.outputs.bump }}**
            - Next version: **${{ steps.rec.outputs.next }}**

            Policy:
            - \\`BREAKING CHANGE\\` or \\`!\\` in type scope -> **major**
            - \\`feat:\\` -> **minor**
            - Others -> **patch**`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const botComment = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
